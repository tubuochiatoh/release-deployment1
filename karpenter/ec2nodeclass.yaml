apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: bottlerocket
spec:
  amiFamily: Bottlerocket

  role: finishline-eks-node-role

  subnetSelectorTerms:
    - tags:
        Name: "finishline-private-*"

  securityGroupSelectorTerms:
    - tags:
        Name: "finishline-vpc"

  tags:
    karpenter.sh/discovery: finishline-eks